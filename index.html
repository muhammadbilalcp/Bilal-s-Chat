<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bilal’s chats</title>
    <style>
        :root {
            --bg-main: #313338;
            --bg-sidebar: #2b2d31;
            --bg-dark: #1e1f22;
            --text-color: #f2f3f5;
            --text-muted: #949ba4;
            --brand-color: #5865f2;
            --brand-hover: #4752c4;
            --input-bg: #1e1f22;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: var(--bg-main); color: var(--text-color); height: 100vh; display: flex; justify-content: center; align-items: center; }
        
        /* Auth Screen Styling */
        .auth-container { background: #313338; padding: 40px; border-radius: 8px; width: 100%; max-width: 480px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .auth-container h2 { text-align: center; margin-bottom: 8px; font-size: 24px; }
        .auth-container p { color: var(--text-muted); text-align: center; margin-bottom: 20px; font-size: 14px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; color: var(--text-muted); font-size: 12px; font-weight: bold; text-transform: uppercase; }
        .form-group input { width: 100%; padding: 10px; background: var(--input-bg); border: 1px solid transparent; color: white; border-radius: 4px; outline: none; }
        .form-group input:focus { border-color: var(--brand-color); }
        .auth-btn { width: 100%; padding: 12px; background: var(--brand-color); color: white; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .auth-btn:hover { background: var(--brand-hover); }
        .toggle-auth { color: #00a8fc; cursor: pointer; font-size: 14px; display: block; text-align: center; margin-top: 15px; }

        /* Main App Interface */
        .app-container { display: none; width: 100vw; height: 100vh; }
        .sidebar { width: 260px; background: var(--bg-sidebar); display: flex; flex-direction: column; border-right: 1px solid #232428; }
        .chat-area { flex: 1; background: var(--bg-main); display: flex; flex-direction: column; }
        
        /* Sidebar Elements */
        .user-profile { padding: 15px; background: var(--bg-dark); display: flex; justify-content: space-between; align-items: center; font-weight: bold; }
        .logout-btn { background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 12px; }
        .logout-btn:hover { color: white; }
        .search-box { padding: 15px; display: flex; gap: 5px; }
        .search-box input { flex: 1; padding: 8px; background: var(--bg-dark); border: none; border-radius: 4px; color: white; }
        .search-box button { background: var(--brand-color); border: none; color: white; padding: 0 10px; border-radius: 4px; cursor: pointer; }
        .friends-list { flex: 1; overflow-y: auto; padding: 10px; }
        .friend-item { padding: 10px; border-radius: 4px; cursor: pointer; margin-bottom: 5px; transition: 0.2s; }
        .friend-item:hover, .friend-item.active { background: #35373c; }

        /* Chat Window Elements */
        .chat-header { padding: 15px; background: var(--bg-main); border-bottom: 1px solid #232428; font-weight: bold; font-size: 18px; }
        .messages-container { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }
        .message { display: flex; flex-direction: column; max-width: 70%; padding: 10px; border-radius: 8px; background: #383a40; align-self: flex-start; }
        .message.own { background: var(--brand-color); align-self: flex-end; }
        .message .meta { font-size: 11px; color: var(--text-muted); margin-bottom: 4px; }
        .message.own .meta { color: #e3e5e8; }
        .message .text { word-break: break-word; }
        
        .input-area { padding: 20px; background: var(--bg-main); }
        .input-wrap { display: flex; background: #383a40; border-radius: 8px; padding: 10px; }
        .input-wrap input { flex: 1; background: none; border: none; color: white; outline: none; padding: 5px; }
    </style>
</head>
<body>

    <div id="authView" class="auth-container">
        <h2 id="authTitle">Welcome to Bilal’s chats</h2>
        <p id="authSubtitle">Log in or create an account to start chatting!</p>
        <div class="form-group">
            <label>Username</label>
            <input type="text" id="authUsername" placeholder="Enter a unique username">
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" id="authPassword" placeholder="Enter your password">
        </div>
        <button class="auth-btn" id="authSubmitBtn" onclick="handleAuth()">Log In</button>
        <span class="toggle-auth" id="toggleAuthMode" onclick="toggleAuthMode()">Need an account? Register</span>
    </div>

    <div id="appView" class="app-container">
        <div class="sidebar">
            <div class="user-profile">
                <span id="currentUsernameDisplay">@Username</span>
                <button class="logout-btn" onclick="logout()">Log Out</button>
            </div>
            <div class="search-box">
                <input type="text" id="searchUserInp" placeholder="Search username...">
                <button onclick="searchAndAddFriend()">Add</button>
            </div>
            <div class="friends-list" id="friendsListContainer">
                </div>
        </div>

        <div class="chat-area">
            <div class="chat-header" id="activeChatHeader">Select a user to start chatting</div>
            <div class="messages-container" id="messagesContainer"></div>
            <div class="input-area">
                <div class="input-wrap">
                    <input type="text" id="messageInput" placeholder="Message..." onkeypress="handleMessageKeyPress(event)">
                </div>
            </div>
        </div>
    </div>

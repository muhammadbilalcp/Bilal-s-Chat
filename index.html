<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bilal’s chats</title>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            --panel-bg: rgba(30, 41, 59, 0.7);
            --border-color: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc;
            --text-secondary: #94a3b8;
            --accent-primary: #6366f1;
            --accent-hover: #4f46e5;
            --msg-own: #818cf8;
            --msg-their: #334155;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', system-ui, -apple-system, sans-serif; }
        body { background: var(--bg-gradient); color: var(--text-main); height: 100vh; height: -webkit-fill-available; display: flex; justify-content: center; align-items: center; overflow: hidden; }
        
        /* Glassmorphism Authentication Card */
        .auth-container { background: var(--panel-bg); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); padding: 30px; border-radius: 24px; width: 90%; max-width: 420px; border: 1px solid var(--border-color); box-shadow: 0 20px 40px rgba(0,0,0,0.4); text-align: center; display: block; }
        .auth-container h2 { font-size: 28px; font-weight: 800; margin-bottom: 8px; background: linear-gradient(to right, #a5b4fc, #6366f1); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .auth-container p { color: var(--text-secondary); margin-bottom: 30px; font-size: 14px; }
        .form-group { margin-bottom: 20px; text-align: left; }
        .form-group label { display: block; margin-bottom: 6px; color: var(--text-secondary); font-size: 12px; font-weight: 600; letter-spacing: 0.5px; }
        .form-group input { width: 100%; padding: 14px; background: rgba(15, 23, 42, 0.6); border: 1px solid var(--border-color); color: white; border-radius: 12px; outline: none; font-size: 15px; transition: all 0.3s; }
        .form-group input:focus { border-color: var(--accent-primary); box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2); }
        .auth-btn { width: 100%; padding: 14px; background: var(--accent-primary); color: white; border: none; border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer; transition: all 0.2s; margin-top: 10px; }
        .auth-btn:hover { background: var(--accent-hover); transform: translateY(-1px); }
        .toggle-auth { color: #f43f5e; cursor: pointer; font-size: 14px; display: block; margin-top: 20px; font-weight: 500; text-decoration: none; }

        /* Custom Responsive Layout Structure */
        .app-container { display: none; width: 100vw; height: 100vh; position: relative; overflow: hidden; }
        
        .sidebar { width: 320px; background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); display: flex; flex-direction: column; border-right: 1px solid var(--border-color); height: 100%; position: relative; }
        .chat-area { flex: 1; display: flex; flex-direction: column; background: rgba(15, 23, 42, 0.2); height: 100%; }
        
        /* App Sidebar Customizations */
        .user-profile { padding: 20px; border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center; }
        .user-profile span { font-weight: 700; font-size: 16px; color: #cbd5e1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 140px; }
        .logout-btn { background: rgba(244, 63, 94, 0.1); border: none; color: #f43f5e; padding: 6px 12px; border-radius: 8px; cursor: pointer; font-size: 12px; font-weight: 600; }
        
        .friends-list { flex: 1; overflow-y: auto; padding: 16px; }
        .friend-item { padding: 16px; border-radius: 14px; cursor: pointer; margin-bottom: 8px; display: flex; align-items: center; border: 1px solid transparent; transition: all 0.2s; background: rgba(255,255,255,0.02); }
        .friend-item:hover { background: rgba(255, 255, 255, 0.05); }
        .friend-item.active { background: rgba(99, 102, 241, 0.2); border-color: rgba(99, 102, 241, 0.4); }

        /* Floating Add Friend Action Button */
        .floating-add-btn { position: absolute; bottom: 24px; right: 24px; width: 56px; height: 56px; background: var(--accent-primary); color: white; border: none; border-radius: 50%; font-size: 28px; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 8px 24px rgba(99, 102, 241, 0.4); z-index: 15; transition: transform 0.2s, background-color 0.2s; }
        .floating-add-btn:hover { background: var(--accent-hover); transform: scale(1.05); }

        /* Modern Dialog Overlay Popup Modal */
        .modal-overlay { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); z-index: 100; justify-content: center; align-items: center; }
        .modal-card { background: #1e293b; border: 1px solid var(--border-color); width: 85%; max-width: 400px; padding: 24px; border-radius: 20px; box-shadow: 0 20px 40px rgba(0,0,0,0.5); }
        .modal-card h3 { font-size: 20px; margin-bottom: 8px; font-weight: 700; color: white; }
        .modal-card p { color: var(--text-secondary); font-size: 13px; margin-bottom: 20px; }
        .modal-actions { display: flex; gap: 10px; margin-top: 20px; justify-content: flex-end; }
        .modal-btn { padding: 10px 18px; border-radius: 10px; border: none; font-weight: 600; cursor: pointer; font-size: 14px; }
        .modal-btn.cancel { background: rgba(255,255,255,0.05); color: var(--text-main); }
        .modal-btn.confirm { background: var(--accent-primary); color: white; }

        /* Modern Chat Workspace Window */
        .chat-header { padding: 20px; background: rgba(15, 23, 42, 0.4); border-bottom: 1px solid var(--border-color); font-weight: 700; font-size: 18px; color: #f8fafc; display: flex; align-items: center; gap: 12px; }
        .back-btn { display: none; background: rgba(255, 255, 255, 0.1); border: none; color: white; padding: 8px 14px; border-radius: 8px; font-weight: 600; cursor: pointer; font-size: 14px; }
        
        .messages-container { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 16px; -webkit-overflow-scrolling: touch; }
        .message { display: flex; flex-direction: column; max-width: 75%; padding: 12px 16px; border-radius: 18px; line-height: 1.4; font-size: 15px; animation: fadeIn 0.15s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
        
        .message.their { background: var(--msg-their); align-self: flex-start; border-bottom-left-radius: 4px; border: 1px solid var(--border-color); }
        .message.own { background: var(--msg-own); align-self: flex-end; border-bottom-right-radius: 4px; color: #0f172a; font-weight: 500; }
        .message .meta { font-size: 11px; margin-bottom: 4px; font-weight: 600; letter-spacing: 0.5px; text-transform: uppercase; }
        .message.their .meta { color: #a5b4fc; }
        .message.own .meta { color: rgba(15, 23, 42, 0.6); }
        .message .text { word-break: break-word; }
        
        .input-area { padding: 20px; background: transparent; }
        .input-wrap { display: flex; background: rgba(15, 23, 42, 0.7); border: 1px solid var(--border-color); border-radius: 16px; padding: 6px 12px; align-items: center; }
        .input-wrap input { flex: 1; background: none; border: none; color: white; outline: none; padding: 8px; font-size: 15px; }

        /* Media Queries handling Tablets and Phones specifically */
        @media (max-width: 768px) {
            .sidebar { position: absolute; left: 0; top: 0; width: 100%; z-index: 10; }
            .chat-area { position: absolute; left: 0; top: 0; width: 100%; z-index: 5; }
            .back-btn { display: block; }
            
            .app-container.chat-active .sidebar { transform: translateX(-100%); }
            .app-container:not(.chat-active) .chat-area { display: none; }
        }
    </style>
</head>
<body>

    <div id="authView" class="auth-container">
        <h2 id="authTitle">Bilal’s chats</h2>
        <p id="authSubtitle">Log in or establish an account to step inside.</p>
        <div class="form-group">
            <label>Username</label>
            <input type="text" id="authUsername" placeholder="Create or enter username" autocomplete="off">
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" id="authPassword" placeholder="Enter password security">
        </div>
        <button class="auth-btn" id="authSubmitBtn" onclick="handleAuth()">Log In</button>
        <span class="toggle-auth" id="toggleAuthMode" onclick="toggleAuthMode()">New here? Create Account</span>
    </div>

    <div id="appView" class="app-container">
        <div class="sidebar">
            <div class="user-profile">
                <span id="currentUsernameDisplay">@User</span>
                <button class="logout-btn" onclick="logout()">Exit</button>
            </div>
            
            <div class="friends-list" id="friendsListContainer"></div>
            
            <button class="floating-add-btn" onclick="openAddFriendModal()">+</button>
        </div>

        <div class="modal-overlay" id="friendModal">
            <div class="modal-card">
                <h3>Add Contact</h3>
                <p>Enter your friend's unique username parameter down below to start a line.</p>
                <div class="form-group" style="margin-bottom: 0;">
                    <input type="text" id="searchUserInp" placeholder="Enter contact handle..." autocomplete="off">
                </div>
                <div class="modal-actions">
                    <button class="modal-btn cancel" onclick="closeAddFriendModal()">Cancel</button>
                    <button class="modal-btn confirm" onclick="searchAndAddFriend()">Add Connection</button>
                </div>
            </div>
        </div>

        <div class="chat-area">
            <div class="chat-header">
                <button class="back-btn" onclick="closeChatMobile()">← Contacts</button>
                <div id="activeChatHeader">Select a contact to begin messaging</div>
            </div>
            <div class="messages-container" id="messagesContainer"></div>
            <div class="input-area">
                <div class="input-wrap">
                    <input type="text" id="messageInput" placeholder="Type a message..." onkeypress="handleMessageKeyPress(event)">
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { 
            getFirestore, doc, setDoc, getDoc, collection, query, where, getDocs, 
            addDoc, serverTimestamp, orderBy, onSnapshot, updateDoc, arrayUnion 
        } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB2RZlRNlTONf4xuxjPMcZgedc9wbIhj-4",
            authDomain: "axid-ai.firebaseapp.com",
            projectId: "axid-ai",
            storageBucket: "axid-ai.firebasestorage.app",
            messagingSenderId: "354519561790",
            appId: "1:354519561790:web:e2b25803bcd713aea4836f",
            measurementId: "G-RBDLQZ6BZB"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let isLoginMode = true;
        let currentUser = null; 
        let activeChatFriend = null;
        let unsubscribeMessages = null;

        // SAFE SYNCHRONOUS BOOT CHECKER
        const savedUser = localStorage.getItem('bilals_chats_user');
        if (savedUser) {
            currentUser = savedUser;
            setTimeout(() => loginSuccess(savedUser), 50);
        }

        window.toggleAuthMode = () => {
            isLoginMode = !isLoginMode;
            document.getElementById('authTitle').innerText = isLoginMode ? "Bilal’s chats" : "Create Account";
            document.getElementById('authSubtitle').innerText = isLoginMode ? "Log in or establish an account to step inside." : "Configure your identity parameters below.";
            document.getElementById('authSubmitBtn').innerText = isLoginMode ? "Log In" : "Register Profile";
            document.getElementById('toggleAuthMode').innerText = isLoginMode ? "New here? Create Account" : "Already registered? Log In";
        };

        window.handleAuth = async () => {
            const username = document.getElementById('authUsername').value.trim().toLowerCase();
            const password = document.getElementById('authPassword').value;

            if(!username || !password) return alert("All profile parameters must be filled.");

            try {
                const userRef = doc(db, "users", username);
                const userSnap = await getDoc(userRef);

                if (isLoginMode) {
                    if (userSnap.exists() && userSnap.data().password === password) {
                        localStorage.setItem('bilals_chats_user', username);
                        loginSuccess(username);
                    } else {
                        alert("Invalid credential parameters matching that identity.");
                    }
                } else {
                    if (userSnap.exists()) {
                        alert("This username registration already exists.");
                    } else {
                        await setDoc(userRef, { password: password, friends: [] });
                        alert("Account profile registered successfully!");
                        localStorage.setItem('bilals_chats_user', username);
                        loginSuccess(username);
                    }
                }
            } catch (err) {
                alert("Database connection block. Make sure your Firestore rules are open.");
                console.error(err);
            }
        };

        function loginSuccess(username) {
            currentUser = username;
            document.getElementById('currentUsernameDisplay').innerText = `@${username}`;
            document.getElementById('authView').style.display = 'none';
            document.getElementById('appView').style.display = 'block';
            
            onSnapshot(doc(db, "users", currentUser), (doc) => {
                if(doc.exists()) {
                    renderFriendsList(doc.data().friends || []);
                }
            });
        }

        window.logout = () => {
            localStorage.removeItem('bilals_chats_user');
            location.reload(); 
        };

        // FRIEND ACTION POPUP WINDOW SYSTEM
        window.openAddFriendModal = () => {
            document.getElementById('friendModal').style.display = 'flex';
            document.getElementById('searchUserInp').focus();
        };

        window.closeAddFriendModal = () => {
            document.getElementById('friendModal').style.display = 'none';
            document.getElementById('searchUserInp').value = "";
        };

        window.searchAndAddFriend = async () => {
            const searchName = document.getElementById('searchUserInp').value.trim().toLowerCase();
            if(!searchName || searchName === currentUser) return alert("Invalid username search request.");

            try {
                const targetUserRef = doc(db, "users", searchName);
                const targetSnap = await getDoc(targetUserRef);

                if(!targetSnap.exists()) {
                    return alert("User not discovered in directory database.");
                }

                await updateDoc(doc(db, "users", currentUser), { friends: arrayUnion(searchName) });
                await updateDoc(targetUserRef, { friends: arrayUnion(currentUser) });

                closeAddFriendModal();
                alert(`User contact added: ${searchName}`);
            } catch (e) {
                alert("Could not link contact. Check database rules config layout.");
            }
        };

        function renderFriendsList(friends) {
            const container = document.getElementById('friendsListContainer');
            container.innerHTML = "";
            
            friends.forEach(friend => {
                const item = document.createElement('div');
                item.className = `friend-item ${activeChatFriend === friend ? 'active' : ''}`;
                item.innerText = `💬  ${friend}`;
                item.onclick = () => startChat(friend);
                container.appendChild(item);
            });
        }

        window.closeChatMobile = () => {
            document.getElementById('appView').classList.remove('chat-active');
            activeChatFriend = null;
            if (unsubscribeMessages) unsubscribeMessages();
        };

        function startChat(friendName) {
            activeChatFriend = friendName;
            document.getElementById('activeChatHeader').innerText = `${friendName}`;
            document.getElementById('appView').classList.add('chat-active');
            
            document.querySelectorAll('.friend-item').forEach(el => {
                el.classList.toggle('active', el.innerText.includes(friendName));
            });

            if (unsubscribeMessages) unsubscribeMessages();

            const chatId = [currentUser, activeChatFriend].sort().join("_");
            const msgQuery = query(collection(db, "chats", chatId, "messages"), orderBy("timestamp", "asc"));
            
            unsubscribeMessages = onSnapshot(msgQuery, (snapshot) => {
                const container = document.getElementById('messagesContainer');
                container.innerHTML = "";
                
                snapshot.forEach(doc => {
                    const data = doc.data();
                    const isOwn = data.sender === currentUser;
                    
                    const msgDiv = document.createElement('div');
                    msgDiv.className = `message ${isOwn ? 'own' : 'their'}`;
                    msgDiv.innerHTML = `
                        <div class="meta">${data.sender}</div>
                        <div class="text">${data.text}</div>
                    `;
                    container.appendChild(msgDiv);
                });
                
                setTimeout(() => {
                    container.scrollTop = container.scrollHeight;
                }, 50);
            });
        }

        window.handleMessageKeyPress = async (e) => {
            if (e.key === 'Enter' && activeChatFriend) {
                const inp = document.getElementById('messageInput');
                const text = inp.value.trim();
                if(!text) return;

                const chatId = [currentUser, activeChatFriend].sort().join("_");
                inp.value = ""; 

                await addDoc(collection(db, "chats", chatId, "messages"), {
                    sender: currentUser,
                    text: text,
                    timestamp: serverTimestamp()
                });
            }
        };
    </script>
</body>
</html>
